<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- iPhone modo app -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#020617">

<title>Sergio TV PRO</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#020617;
    color:white;
}

/* HEADER */
header{
    display:flex;
    gap:10px;
    padding:10px;
    flex-wrap:wrap;
}

button{
    background:#111827;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    color:white;
}

/* SEARCH */
#search{
    margin:10px;
    padding:10px;
    width:90%;
    border-radius:8px;
    border:none;
}

/* PLAYER */
video{
    width:100%;
    height:45vh;
    object-fit:cover;
    background:black;
}

/* GRID */
#grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
    gap:12px;
    padding:12px;
}

/* CARD */
.card{
    background:#111827;
    border-radius:10px;
    overflow:hidden;
    position:relative;
    cursor:pointer;
    transition:0.25s;
}

.card:hover{
    transform:scale(1.1);
    z-index:5;
}

.card.active{
    outline:2px solid #22d3ee;
}

/* LOGO */
.logo{
    width:100%;
    height:90px;
    object-fit:contain;
    background:black;
}

/* NAME */
.name{
    font-size:11px;
    padding:5px;
    text-align:center;
}

/* LIVE */
.live{
    position:absolute;
    top:5px;
    left:5px;
    background:red;
    font-size:10px;
    padding:2px 6px;
    border-radius:4px;
}

/* FAVORITE */
.star{
    position:absolute;
    top:5px;
    right:5px;
    font-size:14px;
}

/* TOAST */
#toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#020617;
    border:1px solid #22d3ee;
    padding:10px 20px;
    border-radius:10px;
    opacity:0;
    transition:0.3s;
}
</style>
</head>

<body>

<header>
<button onclick="app.load('cl')">🇨🇱</button>
<button onclick="app.load('ar')">🇦🇷</button>
<button onclick="app.load('mx')">🇲🇽</button>
<button onclick="app.load('us')">🇺🇸</button>
<button onclick="app.load('es')">🇪🇸</button>
</header>

<input id="search" placeholder="Buscar canal...">

<video id="video" controls autoplay muted playsinline></video>

<div id="grid"></div>

<div id="toast"></div>

<script>
const app={

channels:[],
filtered:[],
favorites:new Set(),
hls:null,
activeId:null,

init(){
    const fav=localStorage.getItem("fav");
    if(fav) this.favorites=new Set(JSON.parse(fav));

    const lastCountry=localStorage.getItem("country")||"cl";
    this.load(lastCountry);

    document.getElementById("search").oninput=()=>this.filter();
},

async load(country){
    localStorage.setItem("country",country);

    const url=`https://iptv-org.github.io/iptv/countries/${country}.m3u`;
    const res=await fetch(url);
    const txt=await res.text();

    this.parse(txt);
},

parse(text){
    this.channels=[];

    const lines=text.split("\n");
    let current={};

    lines.forEach((l,i)=>{
        l=l.trim();

        if(l.startsWith("#EXTINF")){
            current.name=l.split(",")[1]
                .replace(/http.*|Chrome.*|Mobile.*|Safari.*/gi,"")
                .trim();

            const logo=l.match(/tvg-logo="([^"]+)"/);
            current.logo=logo?logo[1]:null;
        }
        else if(l.startsWith("http")){
            current.url=l;
            current.id="ch"+i;
            this.channels.push(current);
            current={};
        }
    });

    this.filtered=[...this.channels];
    this.render();
},

filter(){
    const q=document.getElementById("search").value.toLowerCase();

    this.filtered=this.channels.filter(c=>
        c.name.toLowerCase().includes(q)
    );

    this.filtered.sort((a,b)=>{
        return this.favorites.has(b.id)-this.favorites.has(a.id);
    });

    this.render();
},

render(){
    const grid=document.getElementById("grid");

    grid.innerHTML=this.filtered.map(c=>`
        <div class="card ${this.activeId===c.id?'active':''}" onclick="app.play('${c.id}')">

            <div class="live">EN VIVO</div>

            <div class="star" onclick="app.fav('${c.id}',event)">
                ${this.favorites.has(c.id)?"⭐":"☆"}
            </div>

            <img class="logo" loading="lazy"
            src="${c.logo || 'https://via.placeholder.com/150'}">

            <div class="name">${c.name}</div>
        </div>
    `).join("");
},

fav(id,e){
    e.stopPropagation();

    if(this.favorites.has(id)) this.favorites.delete(id);
    else this.favorites.add(id);

    localStorage.setItem("fav",JSON.stringify([...this.favorites]));
    this.render();
},

play(id){
    const ch=this.channels.find(c=>c.id===id);
    this.activeId=id;

    localStorage.setItem("last",id);

    this.render();

    setTimeout(()=>{
        document.querySelector('.card.active')?.scrollIntoView({
            behavior:'smooth',
            block:'center'
        });
    },200);

    this.start(ch.url);
},

start(url){
    const video=document.getElementById("video");

    if(this.hls) this.hls.destroy();

    let retry=0;

    // 🍎 iPhone usa HLS nativo
    if(video.canPlayType('application/vnd.apple.mpegurl')){
        video.src=url;

    // 🤖 Android / Chrome
    } else if(Hls.isSupported() && url.includes("m3u8")){
        this.hls=new Hls();
        this.hls.loadSource(url);
        this.hls.attachMedia(video);

        this.hls.on(Hls.Events.ERROR,(e,d)=>{
            if(d.fatal){
                if(retry<3){
                    retry++;
                    this.toast("Reintentando...");
                    this.hls.startLoad();
                } else {
                    this.toast("Canal no disponible");
                }
            }
        });

    } else {
        video.src=url;
    }

    video.volume=localStorage.getItem("vol")||1;

    video.onvolumechange=()=>{
        localStorage.setItem("vol",video.volume);
    };

    video.play();

    if(video.webkitEnterFullscreen){
        video.webkitEnterFullscreen();
    }
},

toast(msg){
    const t=document.getElementById("toast");
    t.innerText=msg;
    t.style.opacity=1;

    setTimeout(()=>t.style.opacity=0,2000);
}

};

document.addEventListener("DOMContentLoaded",()=>{
    app.init();

    setTimeout(()=>{
        const last=localStorage.getItem("last");
        if(last) app.play(last);
    },1000);
});
</script>

</body>
</html>
