<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🍎 MODO APP -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#020617">

<title>Sergio TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#020617;
    color:white;
}

/* HEADER */
header{
    display:flex;
    gap:10px;
    padding:10px;
}

button{
    background:#111827;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    color:white;
}

/* PLAYER */
video{
    width:100%;
    height:45vh;
    object-fit:cover;
    background:black;
}

/* GRID */
#grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    padding:10px;
}

/* CARD */
.card{
    background:#111827;
    border-radius:10px;
    overflow:hidden;
}

.logo{
    width:100%;
    height:80px;
    object-fit:contain;
    background:black;
}

.name{
    font-size:11px;
    padding:5px;
    text-align:center;
}
</style>
</head>

<body>

<header>
<button onclick="app.load('cl')">🇨🇱</button>
<button onclick="app.load('ar')">🇦🇷</button>
<button onclick="app.load('mx')">🇲🇽</button>
</header>

<video id="video" controls autoplay muted playsinline></video>

<div id="grid"></div>

<script>
const app={

channels:[],
hls:null,

async load(country){
    const url=`https://iptv-org.github.io/iptv/countries/${country}.m3u`;
    const res=await fetch(url);
    const txt=await res.text();

    this.parse(txt);
},

parse(text){
    const lines=text.split("\n");
    let current={};

    this.channels=[];

    lines.forEach((l,i)=>{
        l=l.trim();

        if(l.startsWith("#EXTINF")){
            current.name=l.split(",")[1].trim();

            const logo=l.match(/tvg-logo="([^"]+)"/);
            current.logo=logo?logo[1]:null;
        }
        else if(l.startsWith("http")){
            current.url=l;
            current.id="ch"+i;
            this.channels.push(current);
            current={};
        }
    });

    this.render();
},

render(){
    const grid=document.getElementById("grid");

    grid.innerHTML=this.channels.map(c=>`
        <div class="card" onclick="app.play('${c.id}')">
            <img class="logo" src="${c.logo || ''}">
            <div class="name">${c.name}</div>
        </div>
    `).join("");
},

play(id){
    const ch=this.channels.find(c=>c.id===id);
    this.start(ch.url);
},

start(url){
    const video=document.getElementById("video");

    // 🍎 iPhone usa HLS nativo
    if(video.canPlayType('application/vnd.apple.mpegurl')){
        video.src=url;

    } else if(Hls.isSupported()){
        if(this.hls) this.hls.destroy();

        this.hls=new Hls();
        this.hls.loadSource(url);
        this.hls.attachMedia(video);
    }

    video.play();

    // 🍎 fullscreen iPhone
    if(video.webkitEnterFullscreen){
        video.webkitEnterFullscreen();
    }
}

};

document.addEventListener("DOMContentLoaded",()=>{
    app.load('cl');
});
</script>

</body>
</html>
