<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">

<title>Sergio TV Premium</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#000;
    color:white;
}

/* HERO */
#hero{
    position:relative;
    height:45vh;
    background:#000;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* HEADER */
header{
    position:absolute;
    top:10px;
    left:10px;
    display:flex;
    gap:10px;
    z-index:5;
}

button{
    background:rgba(0,0,0,0.6);
    border:none;
    padding:6px 10px;
    color:white;
    border-radius:5px;
}

/* SEARCH */
#search{
    width:90%;
    margin:10px;
    padding:10px;
    border-radius:8px;
    border:none;
}

/* ROW */
.row{
    margin:10px;
}

.row-title{
    font-size:14px;
    margin-bottom:8px;
}

/* SCROLL */
.row-content{
    display:flex;
    gap:10px;
    overflow-x:auto;
}

/* CARD */
.card{
    min-width:140px;
    background:#111;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.1);
}

.logo{
    width:100%;
    height:90px;
    object-fit:contain;
    background:black;
}

.name{
    font-size:11px;
    padding:6px;
    text-align:center;
}
</style>
</head>

<body>

<div id="hero">
    <video id="video" autoplay muted playsinline controls></video>

    <header>
        <button onclick="app.load('cl')">🇨🇱</button>
        <button onclick="app.load('ar')">🇦🇷</button>
        <button onclick="app.load('mx')">🇲🇽</button>
        <button onclick="app.load('us')">🇺🇸</button>
    </header>
</div>

<input id="search" placeholder="Buscar canal...">

<div id="content"></div>

<script>
const app={

channels:[],
groups:{},
hls:null,

init(){
    this.load("cl");
    document.getElementById("search").oninput=()=>this.filter();
},

async load(country){
    const url=`https://iptv-org.github.io/iptv/countries/${country}.m3u`;
    const res=await fetch(url);
    const txt=await res.text();
    this.parse(txt);
},

parse(text){
    this.groups={};
    this.channels=[];

    const lines=text.split("\n");
    let current={};

    lines.forEach((l,i)=>{
        l=l.trim();

        if(l.startsWith("#EXTINF")){
            current.name=l.split(",")[1].trim();

            const g=l.match(/group-title="([^"]+)"/);
            current.group=g?g[1]:"Otros";

            const logo=l.match(/tvg-logo="([^"]+)"/);
            current.logo=logo?logo[1]:null;
        }
        else if(l.startsWith("http")){
            current.url=l;
            current.id="ch"+i;

            this.channels.push(current);

            if(!this.groups[current.group]) this.groups[current.group]=[];
            this.groups[current.group].push(current);

            current={};
        }
    });

    this.render();
},

render(){
    const content=document.getElementById("content");

    content.innerHTML=Object.keys(this.groups).map(g=>`
        <div class="row">
            <div class="row-title">${g}</div>
            <div class="row-content">
                ${this.groups[g].map(c=>`
                    <div class="card" onclick="app.play('${c.id}')">
                        <img class="logo" src="${c.logo || ''}">
                        <div class="name">${c.name}</div>
                    </div>
                `).join("")}
            </div>
        </div>
    `).join("");
},

play(id){
    const ch=this.channels.find(c=>c.id===id);

    const video=document.getElementById("video");

    if(this.hls) this.hls.destroy();

    if(video.canPlayType('application/vnd.apple.mpegurl')){
        video.src=ch.url;
    } else {
        this.hls=new Hls();
        this.hls.loadSource(ch.url);
        this.hls.attachMedia(video);
    }

    video.play();
},

filter(){
    const q=document.getElementById("search").value.toLowerCase();

    for(let g in this.groups){
        this.groups[g]=this.groups[g].filter(c=>
            c.name.toLowerCase().includes(q)
        );
    }

    this.render();
}

};

document.addEventListener("DOMContentLoaded",()=>app.init());
</script>

</body>
</html>
